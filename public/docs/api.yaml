            $ref: '#/components/schemas/defaultStatus'
    resp400:
      description: Ошибка
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/defaultError'
    resp404:
      description: Не найдено
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/defaultError'
    resp422:
      description: Ошибка валидации
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/defaultErrorArray'
