openapi: 3.0.0
servers:
  - url: "https://api.greentravel.ua/api"
info:
  version: "1.0.0"
  title: greentravel-api
tags:
  - name: data
    description: Проверка или получение данных
  - name: handbooks
    description: Справочники
  - name: greencard
    description: Оформление и расчет полиса GreenCard
  - name: osago
    description: Оформление и расчет полиса ОСАГО
  - name: osago-salamandra
    description: Оформление и расчет полиса ОСАГО через "Саламандра"
  - name: vzr
    description: Оформление и расчет полиса ВЗР
  - name: orders
    description: Действия с сохраненными полисами
paths:
  /data/inn:
    get:
      tags:
        - data
      operationId: getInnInfo
      parameters:
        - $ref: '#/components/parameters/search'
      summary: Проверка и расшифровка ИНН
      responses:
        '200':
          description: response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/innInfo'
        '422':
          $ref: '#/components/responses/resp422'
      x-swagger-router-controller: Inn
  /handbooks/cars:
    get:
      tags:
        - handbooks
      operationId: getCars
      parameters:
        - $ref: '#/components/parameters/search'
      summary: Справочник марок авто
      responses:
        '200':
          description: response
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/cars'
        '422':
          $ref: '#/components/responses/resp422'
      x-swagger-router-controller: Cars
  /handbooks/cars/{car_mark_id}/models:
    get:
      tags:
        - handbooks
      operationId: getCarModels
      parameters:
        - name: car_mark_id
          in: path
          required: true
          schema:
            type: string
        - $ref: '#/components/parameters/search'
      summary: Справочник моделей авто
      responses:
        '200':
          description: response
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/carModels'
        '404':
          $ref: '#/components/responses/resp404'
      x-swagger-router-controller: Cars
  /handbooks/cars/find:
    get:
      tags:
        - handbooks
      operationId: getFindVehicle
      parameters:
        - $ref: '#/components/parameters/search'
      summary: Поиск информации по номеру авто
      responses:
        '200':
          description: response
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/findVehicle'
      x-swagger-router-controller: Cars
  /handbooks/transport:
    get:
      tags:
        - handbooks
      operationId: getTransport
      parameters:
        - $ref: '#/components/parameters/calcType'
      summary: Типы авто (категории)
      responses:
        '200':
          description: response
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/transport'
      x-swagger-router-controller: Transport
  /handbooks/transport/{transport_category_id}/powers:
    get:
      tags:
        - handbooks
      operationId: getTransportPowers
      parameters:
        - name: transport_category_id
          in: path
          required: true
          schema:
            type: string
      summary: Варианты мощности типа авто
      responses:
        '200':
          description: response
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/transportPower'
        '404':
          $ref: '#/components/responses/resp404'
      x-swagger-router-controller: Transport
  /handbooks/vzrRanges:
    get:
      tags:
        - handbooks
      operationId: getVzrRanges
      summary: Справочник периодов для тур. страховки
      responses:
        '200':
          description: response
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/vzrRange'
      x-swagger-router-controller: VzrRange
  /handbooks/vzrRanges/{vzr_range_id}/days:
    get:
      tags:
        - handbooks
      operationId: getVzrRangeDays
      parameters:
        - name: vzr_range_id
          in: path
          required: true
          schema:
            type: string
      summary: Справочник дней для периода тур. страховки
      responses:
        '200':
          description: response
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/vzrRangeDay'
      x-swagger-router-controller: VzrRange
  /handbooks/cities:
    get:
      tags:
        - handbooks
      operationId: getCities
      parameters:
        - $ref: '#/components/parameters/search'
      summary: Поиск городов
      responses:
        '200':
          description: response
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/findCity'
      x-swagger-router-controller: Cities
  /handbooks/cities/local:
    get:
      tags:
        - handbooks
      operationId: getCitiesLocal
      parameters:
        - $ref: '#/components/parameters/search'
      summary: Поиск городов по локальной БД
      responses:
        '200':
          description: response
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/findCityLocal'
      x-swagger-router-controller: Cities
  /greencard:
    post:
      tags:
        - greencard
      summary: Сохранение черновика зеленой карты
      operationId: postGreencardDraft
      requestBody:
        $ref: '#/components/requestBodies/greencard'
      responses:
        '201':
          description: ok
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/order'
        '422':
          $ref: '#/components/responses/resp422'
      x-swagger-router-controller: Greencard

  /greencard/calculate:
    post:
      tags:
        - greencard
      summary: Расчет суммы по зеленой карте
      operationId: postGreencardCalculate
      requestBody:
        $ref: '#/components/requestBodies/greencardCalculate'
      responses:
        '200':
          description: ok
          content:
            application/json:
              schema:
                type: object
                properties:
                  price:
                    $ref: '#/components/schemas/calculatePrice'
                  price_gos:
                    $ref: '#/components/schemas/calculatePrice'
                  cashback_amount:
                    $ref: '#/components/schemas/cashback_amount'
        '422':
          $ref: '#/components/responses/resp422'
      x-swagger-router-controller: Greencard

  /vzr:
    post:
      tags:
        - vzr
      summary: Сохранение полиса ВЗР
      operationId: postVzr
      requestBody:
        $ref: '#/components/requestBodies/vzrSave'
      responses:
        '201':
          description: ok
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/order'
        '422':
          $ref: '#/components/responses/resp422'
      x-swagger-router-controller: VZR

  /vzr/calculate:
    post:
      tags:
        - vzr
      summary: Расчет суммы по ВЗР
      operationId: postVzrCalculate
      requestBody:
        $ref: '#/components/requestBodies/vzrCalculate'
      responses:
        '200':
          description: ok
          content:
            application/json:
              schema:
                type: object
                properties:
                  price:
                    type: integer
                  days:
                    type: integer
                  ranges:
                    type: array
                    items:
                      type: integer
                  ranges_total_price:
                    type: integer
        '422':
          $ref: '#/components/responses/resp422'
      x-swagger-router-controller: VZR

  /osago:
    post:
      tags:
        - osago
      summary: Сохранение полиса ОСАГО
      operationId: postOsago
      requestBody:
        $ref: '#/components/requestBodies/osago'
      responses:
        '201':
          description: ok
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/order'
        '422':
          $ref: '#/components/responses/resp422'
      x-swagger-router-controller: Osago

  /osago/calculate:
    post:
      tags:
        - osago
      summary: Расчет суммы по ОСАГО
      operationId: postOsagoCalculate
      requestBody:
        $ref: '#/components/requestBodies/osagoCalculate'
      responses:
        '200':
          description: ok
          content:
            application/json:
              schema:
                type: object
                properties:
                  prices:
                    type: array
                    items:
                      type: object
                      properties:
                        tariff:
                          $ref: '#/components/schemas/tariff'
                        price:
                          type: number
                          description: Сумма
        '422':
          $ref: '#/components/responses/resp422'
      x-swagger-router-controller: Osago

  /osago/tariffs:
    get:
      tags:
        - osago
      summary: Получение тарифов по ОСАГО
      operationId: getOsagoTariffs
      responses:
        '200':
          description: ok
          content:
            application/json:
              schema:
                type: array
                items:
                  type: object
                  properties:
                    id:
                      type: integer
                    franchise:
                      type: number
                      description: Размер франшизы
                    tariff:
                      $ref: '#/components/schemas/tariff'
                    coefficient:
                      type: number
      x-swagger-router-controller: Osago

  /osago/salamandra:
    post:
      tags:
        - osago-salamandra
      summary: Сохранение полиса ОСАГО через Саламандру
      operationId: postOsagoSalamandra
      requestBody:
        $ref: '#/components/requestBodies/osagoSalamandra'
      responses:
        '201':
          description: ok
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/order'
        '422':
          $ref: '#/components/responses/resp422'
      x-swagger-router-controller: Osago

  /osago/salamandra/calculate:
    post:
      tags:
        - osago-salamandra
      summary: Расчет суммы по ОСАГО
      operationId: postOsagoSalamandraCalculate
      requestBody:
        $ref: '#/components/requestBodies/osagoSalamandraCalculate'
      responses:
        '200':
          description: ok
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  data:
                    type: object
                    properties:
                      totalPayment:
                        type: number
                      prices:
                        type: object
                        description: Детализация
                        properties:
                          osago:
                            type: number
                            description: Сумма за полис ОСАГО
                          pu:
                            type: number
                            nullable: true
                            description: Сумма за "Пряме врегулювання"
                          dgo:
                            type: number
                            nullable: true
                            description: Сумма за "Додаткові розширення ліміту"
                          dms:
                            type: number
                            nullable: true
                            description: Сумма за "Медична допомога при ДТП"

        '422':
          $ref: '#/components/responses/resp422'
      x-swagger-router-controller: OsagoSalamandra

  /osago/salamandra/tariffs:
    post:
      tags:
        - osago-salamandra
      summary: Получение тарифов по ОСАГО
      operationId: postOsagoSalamandraTariffs
      requestBody:
        $ref: '#/components/requestBodies/osagoSalamandraTariffs'
      responses:
        '200':
          description: ok
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  data:
                    type: object
                    properties:
                      prices:
                        type: object
                        description: Детализация
                        properties:
                          osago:
                            type: object
                            description: Список франшиз с их стоимостю, где ключ - это размер франшизы, а значение - сумма
                            example: {
                              "1500": 877,
                              "2600": 678,
                              "3200": 668
                            }
                          pu:
                            type: object
                            description: Суммы за "Пряме врегулювання", где ключ - это размер франшизы, а значение - сумма
                            example: {
                              "1500": 571,
                              "2600": 441,
                              "3200": 435
                            }
                          dgo:
                            type: object
                            nullable: true
                            description: Сумма за "Додаткові розширення ліміту", где ключ - это размер расширения лимита, а значение - сумма
                            example: {
                              "1000000": 800,
                              "500000": 500,
                              "300000": 330,
                              "200000": 280,
                              "100000": 180
                            }
                          dms:
                            type: number
                            description: Сумма за "Медична допомога при ДТП"
                            example: 300
        '422':
          $ref: '#/components/responses/resp422'
      x-swagger-router-controller: OsagoSalamandra

  /orders/{uuid}:
    get:
      tags:
        - orders
      summary: Получение информации о полисе
      operationId: getOrder
      parameters:
        - $ref: '#/components/parameters/orderUuid'
      responses:
        '200':
          description: ok
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/order'
        '422':
          $ref: '#/components/responses/resp422'
      x-swagger-router-controller: Orders

  /orders/{uuid}/sms/send:
    post:
      tags:
        - orders
      summary: Отправка кода СМС для подтверждения
      operationId: sendSmsOrder
      parameters:
        - $ref: '#/components/parameters/orderUuid'
      responses:
        '200':
          $ref: '#/components/responses/resp200Status'
        '400':
          $ref: '#/components/responses/resp400'
      x-swagger-router-controller: Sms

  /orders/{uuid}/sms/confirm:
    post:
      tags:
        - orders
      summary: Подтверждение СМС
      operationId: confirmSmsOrder
      parameters:
        - $ref: '#/components/parameters/orderUuid'
      requestBody:
        content:
          application/json:
            schema:
              type: object
              required:
                - code
              properties:
                code:
                  type: string
                  example: UA123456
      responses:
        '200':
          $ref: '#/components/responses/resp200Status'
        '400':
          $ref: '#/components/responses/resp400'
      x-swagger-router-controller: Sms

  /orders/promocode:
    get:
      tags:
        - orders
      summary: Проверка промокода
      operationId: getPromocode
      parameters:
        - $ref: '#/components/parameters/polisType'
        - $ref: '#/components/parameters/promocode'
      responses:
        '200':
          description: ok
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/promocodeObject'
        '404':
          $ref: '#/components/responses/resp404'
        '422':
          $ref: '#/components/responses/resp422'
      x-swagger-router-controller: Orders

components:
  requestBodies:
    greencardCalculate:
      content:
        application/json:
          schema:
            type: object
            required:
              - trip_country
              - trip_duration
              - transport
            description: Если upload_docs = false, обязательны все поля, кроме comment и files
            properties:
              trip_country:
                $ref: '#/components/schemas/orderTripCountry'
              trip_duration:
                $ref: '#/components/schemas/orderTripDuration'
              promocode:
                $ref: '#/components/schemas/promocode'
              transport:
                type: object
                description: Данные траспортного средства
                required:
                  - transport_category_id
                properties:
                  transport_category_id:
                    $ref: '#/components/schemas/orderTransportCategoryId'
    vzrCalculate:
      content:
        application/json:
          schema:
            type: object
            required:
              - polis_start
              - multiple_trip
              - epolis
              - with_greencard
              - territory
              - sport
              - target
              - insured_sum
              - tourists
            description: Если multiple_trip = true, то к обязательным добавляются `polis_end` и `vzr_range_day_id`
            properties:
              polis_start:
                $ref: '#/components/schemas/orderPolisStart'
              multiple_trip:
                $ref: '#/components/schemas/multiple_trip'
              epolis:
                $ref: '#/components/schemas/epolis'
              with_greencard:
                $ref: '#/components/schemas/with_greencard'
              polis_end:
                $ref: '#/components/schemas/orderPolisEnd'
              vzr_range_day_id:
                $ref: '#/components/schemas/vzr_range_day_id'
              territory:
                $ref: '#/components/schemas/territory'
              sport:
                $ref: '#/components/schemas/sport'
              target:
                $ref: '#/components/schemas/target'
              insured_sum:
                $ref: '#/components/schemas/insured_sum'
              promocode:
                $ref: '#/components/schemas/promocode'
              tourists:
                type: array
                required:
                  - birth
                items:
                  $ref: '#/components/schemas/tourist'
              ranges:
                type: array
                items:
                  type: string
                  enum:
                    - "0"
                    - "4-15"
                    - "16-18"
                    - "19-60"
                    - "61-65"
                    - "66-75"
    vzrSave:
      content:
        application/json:
          schema:
            type: object
            required:
              - email
              - polis_start
              - multiple_trip
              - epolis
              - with_greencard
              - territory
              - sport
              - target
              - insured_sum
              - tourists
            description: Если multiple_trip = true, то к обязательным добавляются `polis_end` и `vzr_range_day_id`
            properties:
              email:
                $ref: '#/components/schemas/email'
              polis_start:
                $ref: '#/components/schemas/orderPolisStart'
              multiple_trip:
                $ref: '#/components/schemas/multiple_trip'
              epolis:
                $ref: '#/components/schemas/epolis'
              with_greencard:
                $ref: '#/components/schemas/with_greencard'
              polis_end:
                $ref: '#/components/schemas/orderPolisEnd'
              vzr_range_day_id:
                $ref: '#/components/schemas/vzr_range_day_id'
              territory:
                $ref: '#/components/schemas/territory'
              sport:
                $ref: '#/components/schemas/sport'
              target:
                $ref: '#/components/schemas/target'
              insured_sum:
                $ref: '#/components/schemas/insured_sum'
              promocode:
                $ref: '#/components/schemas/promocode'
              dont_call:
                $ref: '#/components/schemas/dont_call'
              code:
                $ref: '#/components/schemas/code'
              code_date_end:
                $ref: '#/components/schemas/code_date_end'
              tourists:
                type: array
                items:
                  $ref: '#/components/schemas/tourist'
              insurant:
                type: object
                required:
                  - phone
                  - inn
                description: Данные страхователя
                properties:
                  phone:
                    $ref: '#/components/schemas/insurantPhone'
                  surname:
                    $ref: '#/components/schemas/insurantSurname'
                  name:
                    $ref: '#/components/schemas/insurantName'
                  inn:
                    $ref: '#/components/schemas/insurantInn'

    osagoCalculate:
      content:
        application/json:
          schema:
            type: object
            required:
              - foreign_check
              - discount_check
              - transport
              - insurant
            description: Если upload_docs = false, обязательны все поля, кроме comment и files
            properties:
              city_id:
                $ref: '#/components/schemas/cityId'
              city_name:
                $ref: '#/components/schemas/cityName'
              foreign_check:
                $ref: '#/components/schemas/foreignCheck'
              discount_check:
                $ref: '#/components/schemas/discountCheck'
              promocode:
                $ref: '#/components/schemas/promocode'
              transport:
                type: object
                description: Данные траспортного средства
                required:
                  - transport_category_id
                  - transport_power_id
                properties:
                  transport_category_id:
                    $ref: '#/components/schemas/orderTransportCategoryId'
                  transport_power_id:
                    $ref: '#/components/schemas/orderTransportPowerId'
              insurant:
                type: object
                description: Данные траспортного средства
                required:
                  - type
                properties:
                  type:
                    $ref: '#/components/schemas/insurantType'
    osagoSalamandraCalculate:
      content:
        application/json:
          schema:
            type: object
            required:
              - transport
              - city_id
              - franchise
            description: Если upload_docs = false, обязательны все поля, кроме comment и files
            properties:
              city_id:
                $ref: '#/components/schemas/salamandraCityId'
              franchise:
                type: integer
                description: Вариант размера франшизы из `POST /osago/salamandra/tariffs`
                example: 2600
              dgo_limit:
                type: integer
                nullable: true
                description: Дополнительная услуга "Додаткові розширення ліміту"
                example: 100000
              is_pu:
                type: boolean
                nullable: true
                description: Дополнительная услуга "Пряме врегулювання"
              is_dms:
                type: boolean
                nullable: true
                description: Дополнительная услуга "Медична допомога при ДТП"
              promocode:
                $ref: '#/components/schemas/promocode'
              transport:
                type: object
                description: Данные траспортного средства
                required:
                  - transport_power_id
                properties:
                  transport_power_id:
                    $ref: '#/components/schemas/orderTransportPowerId'
    osagoSalamandraTariffs:
      content:
        application/json:
          schema:
            type: object
            required:
              - transport
              - city_id
            description: Если upload_docs = false, обязательны все поля, кроме comment и files
            properties:
              city_id:
                $ref: '#/components/schemas/salamandraCityId'
              transport:
                type: object
                description: Данные траспортного средства
                required:
                  - transport_power_id
                properties:
                  transport_power_id:
                    $ref: '#/components/schemas/orderTransportPowerId'

    greencard:
      content:
        application/json:
          schema:
            type: object
            required:
              - trip_country
              - trip_duration
              - email
              - polis_start
              - upload_docs
              - insurant
              - transport
            description: Если upload_docs = false, обязательны все поля, кроме comment и files
            properties:
              trip_country:
                $ref: '#/components/schemas/orderTripCountry'
              trip_duration:
                $ref: '#/components/schemas/orderTripDuration'
              email:
                $ref: '#/components/schemas/email'
              polis_start:
                $ref: '#/components/schemas/orderPolisStart'
              upload_docs:
                $ref: '#/components/schemas/orderUploadDocs'
              comment:
                $ref: '#/components/schemas/comment'
              promocode:
                $ref: '#/components/schemas/promocode'
              dont_call:
                $ref: '#/components/schemas/dont_call'
              cashback_phone:
                type: string
                nullable: true
                description: Телефон для Cashback
              transport:
                type: object
                description: Данные траспортного средства
                required:
                  - transport_category_id
                properties:
                  transport_category_id:
                    $ref: '#/components/schemas/orderTransportCategoryId'
                  car_mark:
                    $ref: '#/components/schemas/orderCarMark'
                  car_model:
                    $ref: '#/components/schemas/orderCarModel'
                  gov_num:
                    $ref: '#/components/schemas/orderGovNum'
                  vin:
                    $ref: '#/components/schemas/orderVin'
                  car_year:
                    $ref: '#/components/schemas/orderCarYear'
