  schemas:
    calculatePrice:
      type: number
      description: Сумма
    cashback_amount:
      type: number
      nullable: true
      description: Сумма Cashback
    insuredSum:
      type: number
      nullable: true
      description: Страховая сумма
    orderTripCountry:
      type: string
      description: Зона покрытия полиса
      nullable: true
      enum:
        - sng
        - eu
    orderTripDuration:
      type: number
      description: Количество месяцев, от 1 до 12, 0 = 15 дней
      nullable: true
      example: 0
    promocode:
      type: string
      description: Промокод
      nullable: true
      example: SALE10
    code:
      type: string
      description: Код для идентификации
      nullable: true
      example: UA123543
    code_date_end:
      type: string
      description: Срок действия кода идентификации
      nullable: true
      example: "2023-01-01 12:00:00"
    email:
      type: string
      format: email
    tariff:
      type: string
      description: Тариф
      example: econom
    cityId:
      type: integer
    salamandraCityId:
      type: integer
      description: ID города из поиска `GET /handbooks/cities/local`
    comment:
      type: string
      description: Комментарий
      nullable: true
    orderPolisStart:
      type: string
      description: Начало действия полиса, не раньше, чем завтра
      format: date
    orderPolisEnd:
      type: string
      description: Окончание действия полиса
      nullable: true
      format: date
    orderUploadDocs:
      type: boolean
      description: Пометка, что будут загружены документы
    foreignCheck:
      type: boolean
      description: Пометка, что иностранная регистрация
    discountCheck:
      type: boolean
      description: Пометка, что есть льгота
    gc_plus:
      type: boolean
      description: Пометка, что включен GreenCard +
    dont_call:
      type: boolean
      description: Пометка не перезванивать
    gc_plus_price:
      type: number
      description: Сумма за GreenCard +
    orderFiles:
      type: array
      description: Обязательно, если upload_docs = true
      items:
        type: string
        format: binary
    orderTransportCategoryId:
      type: integer
      description: ID категории транспорта (тип авто) - из справочника
    orderTransportPowerId:
      type: integer
      description: ID мощности транспорта - из справочника
    orderCarMark:
      type: string
      nullable: true
      description: Название марки авто
    orderCarModel:
      type: string
      nullable: true
      description: Название модели авто
    orderGovNum:
      type: string
      nullable: true
      description: Гос. номер авто
    orderVin:
      type: string
      nullable: true
      description: VIN авто
    orderCarYear:
      type: integer
      nullable: true
      description: Год выпуска авто (4 цифры, от 1970 до текущего года включительно)
      example: 2010
    cityName:
      type: string
      description: Название города
    insurantPhone:
      type: string
      description: Телефон страхователя
    insurantSurname:
      type: string
      nullable: true
      description: Фамилия страхователя
    insurantSurnameLatin:
      type: string
      nullable: true
      description: Фамилия страхователя на латинице
    insurantName:
      type: string
      nullable: true
      description: Имя страхователя
    insurantPatronymic:
      type: string
      nullable: true
      description: Отчество страхователя
    insurantAddress:
      type: string
      nullable: true
      description: Адрес страхователя
    insurantStreet:
      type: string
      nullable: true
      description: Улица страхователя
    insurantHouse:
      type: string
      nullable: true
      description: Номер дома
    insurantFlat:
      type: string
      nullable: true
      description: Номер квартиры
    insurantNameLatin:
      type: string
      nullable: true
      description: Имя страхователя на латинице
    insurantInn:
      type: string
      nullable: true
      description: ИНН страхователя (10 цифр)
    insurantBirth:
      type: string
      format: date
      nullable: true
      description: Дата рождения
    insurantType:
      type: string
      description: Юридическое или физическое лицо
      enum:
        - physical
        - juristic
    insurantDocType:
      type: string
      nullable: true
      description: Тип документа
      enum:
        - passport
        - license
        - id
    insurantDocNumber:
      type: string
      nullable: true
      description: Номер документа
    insurantDocSeries:
      type: string
      nullable: true
      description: Серия документа
    insurantDocGiven:
      type: string
      nullable: true
      description: Кем выдан
    insurantDocDate:
      type: string
      nullable: true
      format: date
      description: Дата выдачи
    created_at:
      type: string
      format: datetime
    updated_at:
      type: string
      format: datetime
    vzr_range_day_id:
      type: integer
      description: ID количества дней пногоразовой поездки. Обязательно, при `multiple_trip = true`
    multiple_trip:
      type: boolean
      description: Флаг многоразовой поездки
    epolis:
      type: boolean
      description: Флаг электронного полиса
    with_greencard:
      type: boolean
      description: Флаг, что полис покупается вместе с полисом Greencard
    territory:
      type: string
      enum:
        - europe
        - world
      description: Территория действия
    sport:
      type: string
      enum:
        - none
        - active
        - pro
      description: Занятия спортом
    target:
      type: string
      enum:
        - rest
        - work
        - learn
      description: Цель поездки
    insured_sum:
      type: number
      enum:
        - 30000
        - 50000
        - 75000
    full_name:
      type: string
      description: ФИО
    tourist:
      type: object
      required:
        - birth
        - full_name
        - doc_number
      properties:
        birth:
          $ref: '#/components/schemas/insurantBirth'
        full_name:
          $ref: '#/components/schemas/full_name'
        doc_number:
          $ref: '#/components/schemas/insurantDocNumber'

    defaultStatus:
      type: object
      properties:
        success:
          type: boolean
          example: TRUE
    defaultError:
      type: object
      properties:
        success:
          type: boolean
          example: false
        message:
          type: string
          description: Описание ошибки
    defaultErrorArray:
      type: object
      properties:
        success:
          type: boolean
          example: false
        message:
          type: object
          description: Ошибки
    findVehicle:
      type: object
      properties:
        LicenceNum:
          type: string
          example: АХ2989ЕІ
        VIN:
          type: string
          example: AAAAAAA1A1A011111
        BodyNum:
          type: string
          nullable: true
        ChassisNum:
          type: string
          nullable: true
        Brand:
          type: string
          example: MITSUBISHI
        Model:
          type: string
          example: LANCER
          nullable: true
        MakeYear:
          type: integer
          example: 2007
        PersonStatusCode:
          type: string
          example: P
        Color:
          type: string
          example: ЗЕЛЕНИЙ
        Kind:
          type: string
          example: ЛЕГКОВИЙ
        BodyType:
          type: string
          example: СЕДАН-B
        Purpose:
          type: string
          example: ЗАГАЛЬНИЙ
        FuelType:
          type: string
          example: БЕНЗИН
        PersonStatus:
          type: string
          example: Фізична особа
        PlacesCount:
          type: integer
          example: 5
        Capacity:
          type: integer
          example: 1584
        OwnWeight:
          type: integer
          example: 1280
        TotalWeight:
          type: integer
          example: 1770
        RegAddr:
          type: string
          example: М. ХАРКІВ,ХАРКІВСЬКА ОБЛ.,УКРАЇНА
        OwnAddr:
          type: string
          example: МОСКОВСЬКИЙ,М. ХАРКІВ,ХАРКІВСЬКА ОБЛ.,УКРАЇНА
        PersonAge:
          type: string
          example: 34
    cars:
      type: object
      properties:
        id:
          type: integer
        name:
          type: string
    carModels:
      type: object
      properties:
        id:
          type: integer
        name:
          type: string
        year_start:
          type: integer
          nullable: true
        year_end:
          type: integer
          nullable: true
    transport:
      type: object
      properties:
        id:
          type: integer
          example: 1
        name_ua:
          type: string
          example: Легковий автомобіль
        name_ru:
          type: string
          example: Легковой автомобиль
        alias:
          type: string
          example: car
        ordering:
          type: integer
          example: 1
    transportPower:
      type: object
      properties:
        id:
          type: integer
          example: 1
        name_ua:
          type: string
          example: до 1600 куб.см
        name_ru:
          type: string
          example: до 1600 куб.см
        coefficient:
          type: number
          example: 1.14
        ordering:
          type: integer
          example: 1
    vzrRange:
      type: object
      properties:
        id:
          type: integer
          example: 1
        name:
          type: string
          example: "180"
        active:
          type: boolean
          example: true
    vzrRangeDay:
      type: object
      properties:
        id:
          type: integer
          example: 5
        vzr_range_id:
          type: integer
          example: 1
        days:
          type: integer
          example: 30
        sum:
          type: number
          example: 13.2
    findCityLocal:
      type: object
      properties:
        id:
          type: integer
        name:
          type: string
          example: Одеса
        name_eng:
          type: string
          example: Odesa
        region_name:
          type: string
          description: Одеська область
    findCity:
      type: object
      properties:
        name:
          type: string
          example: Одеса
        country:
          type: string
          example: UA
        region:
          type: object
          properties:
            caption:
              type: string
              example: Одеська
            postfix:
              type: string
              example: обл.
            country:
              type: string
              example: UA
        postIndex:
          type: string
          example: 65000
        'type':
          type: string
          example: город
        mtsbuId:
          type: integer
          example: 152
        calcZone:
          type: object
          example: 2
    innInfo:
      type: object
